<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OpenClaw Companion</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
    
    body {
      width: 340px;
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at top left, #0c0a0f, #030005);
      color: #fafafa;
      padding: 20px;
      box-sizing: border-box;
    }
    
    .card {
      background: rgba(25, 20, 35, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      text-align: center;
    }

    h1 {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .status-active .status-dot {
      background: #10b981;
      box-shadow: 0 0 12px #10b981;
    }

    .status-offline .status-dot {
      background: #ef4444;
      box-shadow: 0 0 12px #ef4444;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      color: white;
    }

    .footer {
      font-size: 10px;
      color: #64748b;
      margin-top: 20px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>OpenClaw Companion ⚡</h1>
    <div class="subtitle">Autonomous Job Hunting Agent</div>
    
    <div id="connection-container" class="status-badge status-offline">
      <span class="status-dot"></span>
      <span id="connection-status">Offline</span>
    </div>

    <div class="button-group">
      <button class="btn-primary" id="open-dashboard">Launch Dashboard</button>
      <button class="btn-secondary" id="open-sidepanel">Toggle Side Panel</button>
    </div>

    <div class="footer">OpenClaw Engine v1.0.0</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
