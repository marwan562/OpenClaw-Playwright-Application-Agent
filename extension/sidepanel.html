<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OpenClaw Side Panel</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #09090b;
      color: #fafafa;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      padding: 12px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 1px solid #27272a;
    }
    .title { font-size: 16px; font-weight: bold; color: #6366f1; }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      margin: 12px 0;
      padding: 8px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      font-size: 13px;
    }
    .input-area {
      display: flex;
      gap: 8px;
    }
    input {
      flex: 1;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: white;
      padding: 8px;
      font-size: 13px;
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    .message { margin-bottom: 12px; }
    .message-user { color: #818cf8; font-weight: bold; }
    .message-agent { color: #10b981; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">OpenClaw Side Panel ⚡</div>
    <span id="conn-state" style="font-size: 11px; color: #10b981;">Connected</span>
  </div>
  <div class="chat-area" id="chat-box">
    <div class="message"><span class="message-agent">Homi:</span> Welcome to OpenClaw. Ready for autonomous applications.</div>
  </div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Ask Homi or paste job link...">
    <button id="send-btn">Send</button>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
